<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --active-bg: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --hover-bg: #334155;
            --active-bg: #475569;
        }
        [data-theme="nordic"] {
            --bg-main: #EFEBE0; 
            --bg-panel: #F7F5F0;
            --text-main: #2C363F;
            --text-muted: #6B727A;
            --border-color: #D6D2C4;
            --hover-bg: #E4E0D0;
            --active-bg: #D6D2C4;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
        }
        .panel { background-color: var(--bg-panel); border-color: var(--border-color); }
        .border-theme { border-color: var(--border-color); }
        .text-muted { color: var(--text-muted); }
        .hover-bg:hover { background-color: var(--hover-bg); }
        .active-bg { background-color: var(--active-bg); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .preview-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Tỉ lệ 16:9 */
            overflow: hidden;
            background-color: #fff;
        }
        .preview-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 400%;
            height: 400%;
            transform: scale(0.25);
            transform-origin: top left;
            pointer-events: none; /* Rất quan trọng: cho phép click xuyên qua iframe để ăn vào thẻ <a> */
            border: none;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex">
    
    <aside class="w-[300px] h-full panel border-r border-theme flex flex-col z-10 flex-shrink-0">
        <div class="p-8 border-b border-theme">
            <h1 class="text-xl font-semibold tracking-tight">Thư viện HTML</h1>
            <p class="text-[11px] text-muted mt-2 tracking-widest uppercase">Duyệt theo Folder</p>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4" id="folder-list">
            <!-- Render danh sách thư mục -->
        </div>

        <div class="p-6 border-t border-theme">
            <p class="text-[11px] font-semibold text-muted uppercase tracking-[0.15em] mb-3">Chế độ hiển thị</p>
            <div class="flex gap-2">
                <button onclick="setTheme('light')" class="flex-1 py-2 rounded border border-theme text-xs font-medium hover-bg transition-colors">Light</button>
                <button onclick="setTheme('dark')" class="flex-1 py-2 rounded border border-theme text-xs font-medium hover-bg transition-colors">Dark</button>
                <button onclick="setTheme('nordic')" class="flex-1 py-2 rounded border border-theme text-xs font-medium hover-bg transition-colors">Nordic</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 h-full flex flex-col relative overflow-hidden">
        <header class="h-16 panel border-b border-theme flex items-center px-8 justify-between flex-shrink-0">
            <span id="current-folder-title" class="text-xs font-semibold text-muted uppercase tracking-widest">
                Đang tải...
            </span>
        </header>
        
        <div class="flex-1 overflow-y-auto p-8 relative">
            <div id="grid-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-8 max-w-[2400px] mx-auto w-full">
                <!-- Render thẻ -->
            </div>
        </div>
    </main>

    <script>
        const fileData = {"dansk":[{"name":"Sơ đồ tư duy CẤU TRÚC CÂU TIẾNG ĐAN MẠCH.html","path":"HTMLS/dansk/Sơ đồ tư duy CẤU TRÚC CÂU TIẾNG ĐAN MẠCH.html"},{"name":"case cấu trúc câu copy.html","path":"HTMLS/dansk/case cấu trúc câu copy.html"},{"name":"case cấu trúc câu.html","path":"HTMLS/dansk/case cấu trúc câu.html"},{"name":"cấu trúc câu.html","path":"HTMLS/dansk/cấu trúc câu.html"},{"name":"cụm giới từ.html","path":"HTMLS/dansk/cụm giới từ.html"},{"name":"danish-vocabulary.html","path":"HTMLS/dansk/danish-vocabulary.html"},{"name":"du3mol3part2 speaking.html","path":"HTMLS/dansk/du3mol3part2 speaking.html"},{"name":"gemini-code-1779004614582.html","path":"HTMLS/dansk/gemini-code-1779004614582.html"}],"dansk/du33":[{"name":"a.html","path":"HTMLS/dansk/du33/a.html"},{"name":"b.html","path":"HTMLS/dansk/du33/b.html"},{"name":"c.html","path":"HTMLS/dansk/du33/c.html"}],"dansk/du33/nói":[{"name":"công việc.html","path":"HTMLS/dansk/du33/nói/công việc.html"},{"name":"ngôn ngữ.html","path":"HTMLS/dansk/du33/nói/ngôn ngữ.html"}],"dansk/du33/viết":[{"name":"viết.html","path":"HTMLS/dansk/du33/viết/viết.html"}],"dansk/ngữ pháp":[{"name":"3_grammatiktillaeg.html","path":"HTMLS/dansk/ngữ pháp/3_grammatiktillaeg.html"},{"name":"8 ORDSTILLING (syntaks) đáp án.html","path":"HTMLS/dansk/ngữ pháp/8 ORDSTILLING (syntaks) đáp án.html"}]};
        let currentFolder = Object.keys(fileData)[0] || null;

        function init() {
            renderFolders();
            if (currentFolder) selectFolder(currentFolder);
            
            const savedTheme = localStorage.getItem('html-gallery-theme') || 'light';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('html-gallery-theme', theme);
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = '';
            
            for (const folder in fileData) {
                const btn = document.createElement('button');
                const isActive = folder === currentFolder;
                btn.className = 'w-full text-left px-4 py-3 mb-2 text-sm rounded-lg truncate transition-colors duration-200 focus:outline-none font-medium folder-btn ' + (isActive ? 'active-bg' : 'hover-bg text-muted');
                btn.innerText = folder;
                btn.onclick = () => selectFolder(folder);
                list.appendChild(btn);
            }
        }

        function selectFolder(folder) {
            currentFolder = folder;
            document.getElementById('current-folder-title').innerText = 'Thư mục: ' + folder;
            
            document.querySelectorAll('.folder-btn').forEach(btn => {
                if (btn.innerText === folder) {
                    btn.classList.add('active-bg');
                    btn.classList.remove('hover-bg', 'text-muted');
                } else {
                    btn.classList.remove('active-bg');
                    btn.classList.add('hover-bg', 'text-muted');
                }
            });

            renderCards(folder);
        }

        function renderCards(folder) {
            const grid = document.getElementById('grid-view');
            grid.innerHTML = '';
            
            const files = fileData[folder] || [];
            files.forEach(file => {
                // Thay thế <div> bằng thẻ <a> để tạo link gốc
                const card = document.createElement('a');
                card.href = file.path;
                card.target = '_blank'; // Mở sang tab mới
                card.className = 'panel border border-theme rounded-xl overflow-hidden cursor-pointer group hover:-translate-y-1 hover:shadow-lg transition-all duration-300 block';
                
                card.innerHTML = 
                    '<div class="preview-container border-b border-theme">' +
                        '<iframe class="preview-iframe" src="' + file.path + '" loading="lazy"></iframe>' +
                    '</div>' +
                    '<div class="p-4 flex items-center justify-between">' +
                        '<span class="text-sm font-medium truncate pr-4">' + file.name + '</span>' +
                        // Icon link out
                        '<svg class="w-4 h-4 text-muted opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>' +
                    '</div>';
                grid.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
