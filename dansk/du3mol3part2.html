<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opgave 2 – Øvelse DU3 Modul 3</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #C0392B;
            --red-light: #FDEDEC;
            --red-mid: #F1948A;
            --navy: #1A2540;
            --navy-mid: #2C3E6B;
            --text: #1A1A2E;
            --text-muted: #5A6070;
            --text-hint: #9099AA;
            --bg: #F4F6F9;
            --surface: #FFFFFF;
            --surface2: #F8F9FB;
            --border: rgba(0, 0, 0, 0.10);
            --border-strong: rgba(0, 0, 0, 0.18);
            --green: #1E8449;
            --green-light: #EAFAF1;
            --blue: #154360;
            --blue-light: #EBF5FB;
            --amber: #784212;
            --amber-light: #FEF9E7;
            --purple: #512E5F;
            --purple-light: #F5EEF8;
            --teal: #0E6251;
            --teal-light: #E8F8F5;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            --radius: 10px;
            --radius-sm: 6px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
        }

        /* LAYOUT */
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: var(--navy);
            color: white;
            flex-shrink: 0;
            padding: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .main {
            flex: 1;
            padding: 28px 32px;
            width: auto;
        }

        /* SIDEBAR */
        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .sidebar-subtitle {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .sidebar-badge {
            display: inline-block;
            background: var(--red);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 0.04em;
        }

        .topic-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.72);
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
        }

        .topic-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: white;
        }

        .topic-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .topic-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .topic-name {
            font-weight: 500;
            line-height: 1.3;
        }

        .topic-sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
        }

        .sidebar-section {
            padding: 8px 20px 4px;
            margin-top: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        .sidebar-tip {
            padding: 14px 20px;
            margin: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            border-left: 3px solid var(--red);
        }

        /* HEADER */
        .page-header {
            margin-bottom: 24px;
        }

        .page-topic {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .page-topic-icon {
            font-size: 24px;
        }

        .page-topic-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--navy);
        }

        .page-topic-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--amber-light);
            color: var(--amber);
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(120, 66, 18, 0.15);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 10px 18px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn:hover {
            color: var(--navy);
        }

        .tab-btn.active {
            color: var(--red);
            border-bottom-color: var(--red);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card+.card {
            margin-top: 12px;
        }

        /* BILLEDER TAB */
        .images-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .image-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            cursor: default;
        }

        .image-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .image-emoji {
            font-size: 40px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .image-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .image-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .format-box {
            background: var(--blue-light);
            border: 1px solid rgba(21, 67, 96, 0.15);
            border-radius: var(--radius);
            padding: 16px 20px;
        }

        .format-box h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .format-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-top: 1px solid rgba(21, 67, 96, 0.1);
        }

        .format-row:first-of-type {
            border-top: none;
        }

        .format-tag {
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 700;
            background: var(--blue);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 2px;
        }

        .format-text {
            font-size: 14px;
            color: var(--blue);
        }

        .task-tip {
            background: #FFFBF0;
            border: 1px solid rgba(120, 66, 18, 0.2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 13px;
            color: var(--amber);
        }

        .task-tip strong {
            font-weight: 600;
        }

        /* DEL 1 TAB */
        .tip-box {
            background: var(--amber-light);
            border: 1px solid rgba(120, 66, 18, 0.18);
            border-left: 4px solid #E67E22;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--amber);
        }

        .tip-box strong {
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .dialogue {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .bubble-a {
            flex-direction: row;
        }

        .bubble-b {
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            color: white;
        }

        .avatar-a {
            background: var(--navy-mid);
        }

        .avatar-b {
            background: var(--red);
        }

        .bubble-text {
            max-width: 72%;
            padding: 11px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
        }

        .bubble-a .bubble-text {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .bubble-b .bubble-text {
            background: var(--navy);
            color: white;
            border-top-right-radius: 4px;
        }

        .phrase-box {
            background: var(--green-light);
            border: 1px solid rgba(30, 132, 73, 0.15);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-top: 20px;
        }

        .phrase-box h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .phrase-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .phrase-chip {
            background: white;
            border: 1px solid rgba(30, 132, 73, 0.2);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            font-size: 13px;
            color: var(--green);
        }

        /* DEL 2 TAB */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
        }

        .q-header {
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
        }

        .q-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 0.08em;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .q-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--navy);
            flex: 1;
        }

        .q-toggle {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            background: none;
            transition: background 0.15s;
        }

        .q-toggle:hover {
            background: var(--bg);
        }

        .q-answer {
            display: none;
            padding: 14px 20px;
            background: var(--green-light);
            border-top: 1px solid rgba(30, 132, 73, 0.12);
        }

        .q-answer.open {
            display: block;
        }

        .q-answer-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .q-answer-text {
            font-size: 14px;
            color: var(--green);
            line-height: 1.6;
        }

        .vn-note {
            font-size: 12px;
            color: var(--text-hint);
            font-style: italic;
            margin-top: 5px;
        }

        /* VOCABULARY TAB */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .vocab-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
        }

        .vocab-word {
            font-size: 15px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 4px;
        }

        .vocab-def {
            font-size: 13px;
            color: var(--text-muted);
        }

        .vocab-section {
            margin-top: 24px;
        }

        .vocab-section h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .phrase-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .phrase-table td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
        }

        .phrase-table td:first-child {
            font-weight: 500;
            color: var(--navy);
            width: 50%;
        }

        .phrase-table td:last-child {
            color: var(--text-muted);
        }

        .phrase-table tr:last-child td {
            border-bottom: none;
        }

        /* INTRO CARD */
        .intro-card {
            background: var(--red-light);
            border: 1px solid rgba(192, 57, 43, 0.2);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 24px;
        }

        .intro-card h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--red);
            margin-bottom: 10px;
        }

        .intro-steps {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .step {
            flex: 1;
            min-width: 140px;
            background: white;
            border: 1px solid rgba(192, 57, 43, 0.15);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
        }

        .step-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .step-text {
            font-size: 13px;
            color: var(--text);
        }

        @media (max-width: 700px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
            }

            .main {
                padding: 16px;
            }

            .images-grid {
                grid-template-columns: 1fr;
            }

            .phrase-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Øvelse</div>
                <div class="sidebar-subtitle">Opgave 2</div>
                <div class="sidebar-badge">DU3 · Modul 3</div>
            </div>
            <div class="sidebar-section">Emner</div>

            <!-- Emner / Topics will be generated dynamically by JS -->
            <div id="sidebar-nav"></div>

            <div class="sidebar-tip">
                💡 <strong>Tip:</strong> Lad Del 1 starte med at se billederne, derefter øv dialogen, til sidst øv Del 2
                ved at skjule svarene.
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main" id="main-content">
            <!-- Filled dynamically by JS -->
        </main>
    </div>

    <script>
        const topics = [
            {
                emoji: "🚌",
                title: "Transportmidler",
                sub: "Transport og pendling",
                images: [
                    { emoji: "🚲", label: "Cykel", desc: "En person cykler på en bred cykelsti i den danske by" },
                    { emoji: "🚌", label: "Bus", desc: "Passagerer venter tålmodigt ved et busstoppested i regnen" },
                    { emoji: "🚗", label: "Bil", desc: "En familie kører roligt på motorvejen en lørdag" },
                    { emoji: "🚶", label: "Til fods", desc: "En person nyder en gåtur gennem et stille kvarter" },
                    { emoji: "🚆", label: "Tog", desc: "Passagerer læser, arbejder og slapper af i et moderne S-tog" },
                    { emoji: "🛵", label: "Motorcykel", desc: "En person navigerer effektivt og hurtigt gennem morgentrafik" }
                ],
                del1tip: "Husk: Du skal spørge din partner om ALLE billeder og give din egen mening undervejs. Brug: 'Hvilken foretrækker du frem for de andre?', 'Synes du, at det er praktisk?', 'Hvad er den største ulempe ved...?', 'Er det dyrt eller billigt at bruge...?'",
                dialogue: [
                    { s: "A", t: "Hvilken af disse transportmidler bruger du helst i din hverdag? Jeg foretrækker helt klart cyklen, fordi det er sundt, billigt og hjælper mig med at holde formen. Hvad med dig?" },
                    { s: "B", t: "Jeg bruger mest bussen eller toget, når jeg skal på arbejde. Jeg kan godt lide at læse eller høre podcasts, mens jeg kører – det er meget bedre for miljøet end at køre bil. Synes du ikke, at det er lidt farligt at cykle i myldretiden?" },
                    { s: "A", t: "Det kan godt være lidt udfordrende, men i Danmark er der heldigvis rigtig gode cykelstier næsten overalt. Trafikkulturen er også meget mere respektfuld over for cyklister end i mange andre lande. Hvad synes du om at gå til fods, hvis det ikke er for langt?" },
                    { s: "B", t: "Det kan jeg faktisk rigtig godt lide, især om morgenen, når vejret er godt. Det er en dejlig måde at rydde tankerne og starte dagen på. Men om vinteren er det simpelthen for koldt og mørkt. Hvornår bruger du bilen?" },
                    { s: "A", t: "Jeg bruger kun bil, når jeg skal handle mange tunge ting, køre børn til aktiviteter, eller når det regner rigtig meget. Til hverdag prøver jeg at undgå det på grund af miljøet og parkeringsudgifterne. Og dig? Kører du nogensinde bil eller motorcykel?" },
                    { s: "B", t: "Sjældent bil. Men jeg kører af og til på motorcykel. Det er utrolig praktisk til at navigere hurtigt gennem gaderne og finde parkeringspladser. Hvad synes du om motorcykel som transportmiddel?" },
                    { s: "A", t: "Det lyder smart, men jeg er lidt nervøs for sikkerheden, især i dårligt vejr eller på glatte veje. Og jeg tror, man kan fryse rigtigt meget om vinteren! Kører du med hjelm og fuld beskyttelse?" },
                    { s: "B", t: "Selvfølgelig! Sikkerhed er altid det vigtigste. Jeg tror, offentlig transport er det mest afslappende valg i det daglige, men motorcyklen er god, når jeg skal hurtigt fra A til B." },
                    { s: "A", t: "Det er et godt punkt. Hvad koster det månedligt for dig at bruge toget og bussen? Er det dyrere eller billigere end at have en bil?" },
                    { s: "B", t: "Et månedskort koster mig cirka 500 kroner om måneden. Det er klart billigere end biludgifter med forsikring, brændstof og parkering. Så på det punkt er offentlig transport klart en fordel." },
                    { s: "A", t: "Det er jeg enig i. Og tænk på CO2-aftrykket! Hvad ville du råde en ny flygtning til at bruge for at komme rundt i din by?" },
                    { s: "B", t: "Helt klart cyklen til hverdagen og bussen til de lidt længere ture. Det er billigst, miljøvenligst og en rigtig god måde at lære byen at kende på." }
                ],
                phrases: [
                    "Hvilken foretrækker du frem for...?", "Synes du, at det er...?", "Har du nogensinde prøvet at...?",
                    "Hvad er den største fordel ved...?", "Er det billigt eller dyrt at bruge...?", "Hvornår bruger du normalt...?",
                    "Det er bedre for miljøet", "At rydde tankerne om morgenen", "At navigere hurtigt gennem gaderne",
                    "I myldretiden er det kaotisk", "Det hjælper mig med at holde formen", "At undgå forsinkelser og stress",
                    "Det er en praktisk og billig løsning", "På den anden side synes jeg...", "Hvad er dit indtryk af...?",
                    "Det koster mig cirka... om måneden", "Hvad ville du råde en til...?", "Det er mest miljøvenligt at...",
                    "Man sparer både tid og penge", "Trafikkulturen er meget anderledes her"
                ],
                del2: [
                    { q: "Hvilket transportmiddel bruger du normalt?", a: "Jeg cykler som regel til sprogcentret hver morgen. Det tager cirka 15 minutter, og det er rigtig god motion. Om vinteren tager jeg nogle gange bussen, hvis det er for koldt eller glat.", vn: "Dùng 'som regel' (thường thì) để nói về thói quen hằng ngày. Thêm exception (om vinteren) để câu trả lời thực tế hơn." },
                    { q: "Hvor tit rejser du med bil?", a: "Jeg rejser sjældent med bil i hverdagen, fordi det ikke er godt for trafikken og miljøet. Jeg foretrækker at gå, cykle eller tage bussen. Men til familieudflugt i weekenden låner vi somme tider en bil.", vn: "Giải thích lý do (bảo vệ môi trường, tắc đường) và thêm exception hợp lý (cuối tuần)." },
                    { q: "Hvordan kommer du til skole eller arbejde?", a: "Jeg bruger offentlig transport som bussen eller S-toget for at komme til mit kursus. Det sænker risikoen for ulykker og er mere miljøvenligt. Og jeg kan bruge rejsetiden til at øve mig i dansk!", vn: "Đề cập đến sự an toàn và môi trường, và thêm điểm sáng tạo: học tiếng trong lúc đi xe." },

                    { q: "Hvor tit laver du mad derhjemme?", a: "Jeg laver mad næsten hver aften. Det er en god måde at sikre, at vi spiser sundt, og det giver mig mulighed for at eksperimentere med nye opskrifter og smage lidt af verdens køkkener hjemmefra.", vn: "Giải thích lợi ích: sức khỏe và sự sáng tạo khi nấu ăn. 'Verdens køkkener' thể hiện sự tò mò ẩm thực." },
                    { q: "Hvilken slags mad kan du bedst lide at spise?", a: "Jeg elsker frisk, lokal mad med masser af grøntsager, fisk og fuldkorn. Det er vigtigt for mig at have en balanceret kost. Men indimellem er en god pizza eller burger også dejlig – man skal ikke være for streng med sig selv!", vn: "Thể hiện quan điểm cân bằng: ăn lành mạnh nhưng không quá cứng nhắc, thỉnh thoảng cũng thưởng thức đồ ăn 'syndig'." },
                    { q: "Hvem spiser du normalt aftensmad sammen med?", a: "Jeg spiser normalt sammen med min mand og vores to børn. Det er en særlig tid for os at dele dagens oplevelser og nyheder med hinanden – uden mobiltelefoner ved bordet! Det er en regel, vi holder strengt.", vn: "Nhấn mạnh việc chia sẻ và quy tắc không dùng điện thoại trong bữa ăn – điều phổ biến ở gia đình Đan Mạch." },
                    { q: "Synes du, at kage er lækkert?", a: "Ja, absolut! I Danmark er der en fantastisk tradition for at nyde kage til kaffe – det hedder 'kaffehygge'. Jeg kan især godt lide kanelsneglen og den klassiske æblekage. Men jeg spiser det kun en gang imellem.", vn: "Liên hệ văn hóa 'kaffehygge' đặc trưng Đan Mạch và nêu tên bánh cụ thể: kanelsnegl, æblekage." },
                    { q: "Synes du, at det er sundt at spise på fastfood-restauranter?", a: "Nej, generelt ikke. Fastfood indeholder ofte meget salt, sukker og mættet fedt, hvilket kan føre til helbredsproblemer over tid. Men det er selvfølgelig praktisk og tilgængeligt, så det handler om at gøre det til en sjælden fornøjelse.", vn: "Nêu thành phần không lành mạnh (muối, đường, chất béo) nhưng cũng thừa nhận tính tiện lợi và nhấn mạnh sự điều độ." },
                    { q: "Synes du, at det er billigt at holde picnic i parken?", a: "Ja, det er utrolig billigt! Man kan tage hjemmelavet mad og en flaske vand med og nyde en hel eftermiddag i naturen gratis. Det er en af de bedste og billigste glæder i livet, synes jeg.", vn: "Nhấn mạnh tính kinh tế và không gian hòa mình với thiên nhiên, dùng tone nhẹ nhàng và tích cực." },
                    { q: "Hvad er din yndlingscafé eller -restaurant her i byen?", a: "Min yndlingscafé ligger nede ved havnen. De serverer rigtig god, stærk kaffe og lækre smørrebrød. Stemningen er rolig og hyggelig, og personalet er altid imødekommende og venligt.", vn: "Miêu tả địa điểm cụ thể: vị trí (tại cảng), món ngon, không khí ấm cúng, nhân viên tốt." },
                    { q: "Hvad er den største forskel på at spise hjemme og på restaurant?", a: "Hjemme er det langt billigere og ofte sundere. På restaurant betaler man ikke kun for maden, men også for oplevelsen, atmosfæren, servicen og det faktum, at man slipper for at lave mad og vaske op bagefter.", vn: "So sánh toàn diện: giá cả, sức khỏe vs. trải nghiệm, dịch vụ, và sự tiện lợi không cần rửa bát." },
                    { q: "Hvem er det, der oftest laver maden i din familie?", a: "Det er normalt mig, der har ansvar for aftensmaden, fordi jeg kommer hjem fra arbejde først. Min mand laver mad i weekenden og er faktisk bedre til det end mig! Det fungerer godt at dele de huslige pligter.", vn: "Chia sẻ cách phân công việc nhà công bằng và thêm yếu tố hài hước (mand laver bedre mad)." },
                    { q: "Bruger du opskrifter, eller laver du mad på slump?", a: "Det afhænger af retten. Til dagligdags madlavning kender jeg de fleste opskrifter udenad og laver mad på rutine. Men prøver jeg noget nyt og avanceret, googler jeg altid opskriften for at gøre det rigtigt.", vn: "Phân biệt rõ hai trường hợp: nấu theo thói quen quen thuộc vs. nấu món mới cần tra công thức." },
                    { q: "Synes du, det er vigtigt at spise økologisk?", a: "Ja, det synes jeg i princippet. Økologisk mad er bedre for miljøet og for vores helbred. Men det er desværre dyrere, så jeg prøver at vælge de vigtigste ting som kød, mælk og æg i økologisk kvalitet.", vn: "Thể hiện quan điểm cân bằng: ủng hộ hữu cơ về mặt nguyên tắc nhưng thực tế vì giá cả, chọn lọc có chủ đích." }

                    { q: "Tror du, det er sandt, at en fælles hobby kan styrke et venskab?", a: "Ja, 100 procent! Fælles interesser skaber en unik og stærk forbindelse. Når man dyrker en hobby sammen – spiller badminton, går til kor eller læser i den samme bogklub – har man altid noget at tale om og dele.", vn: "Khẳng định mạnh mẽ và đưa ra ví dụ cụ thể (cầu lông, hát hợp xướng, câu lạc bộ sách)." },
                    { q: "Hvad er det dyreste kulturelle arrangement, du nogensinde har deltaget i?", a: "Jeg var til en stor klassisk koncert med et fuldt symfoniorkester engang. Billetten kostede 400 kroner, men det var virkelig noget særligt og overvældende at opleve live musikken fylde hele salen. Det var et minde for livet!", vn: "Chia sẻ trải nghiệm văn hóa đặc biệt và đắt tiền với cảm xúc chân thực — kỷ niệm suốt đời." },
                    { q: "Hvad er den nemmeste og billigste hobby, du kan anbefale til andre?", a: "Løb er helt klart den nemmeste og billigste hobby! Man har kun brug for et par sko, og man kan løbe overalt, når som helst. Derudover er det utrolig godt for både kroppen og mentalen. Det kan jeg varmt anbefale til alle.", vn: "Giới thiệu môn chạy bộ như sở thích hoàn hảo: đơn giản, rẻ, tốt cho cả thể chất và tinh thần." }
                ],
                vocab: [
                    ["fritidsinteresse / hobby", "sở thích / thú vui lúc rảnh rỗi"], ["at koble af / at lade op", "ngắt kết nối / nạp lại năng lượng"],
                    ["at have grønne fingre", "có tay trồng trọt (giỏi làm vườn)"], ["udstilling / fernisering", "buổi triển lãm nghệ thuật"],
                    ["kulturelt arrangement / event", "sự kiện / chương trình văn hóa"], ["at fotografere / tage billeder", "chụp ảnh"],
                    ["at forbedre sit ordforråd", "cải thiện vốn từ vựng"], ["hverdagens stress og jag", "sự căng thẳng và xô bồ của ngày thường"],
                    ["en krimi / historisk roman", "truyện trinh thám / tiểu thuyết lịch sử"], ["tålmodig / utålmodig", "kiên nhẫn / thiếu kiên nhẫn"],
                    ["at være pebret / dyrt", "đắt đỏ (về giá cả)"], ["ligesindede mennesker", "những người cùng chí hướng / sở thích"],
                    ["sammenskudsgilde / frokostselskab", "tiệc góp / bữa ăn trưa cùng nhau"], ["frirum / kreativt frirum", "không gian tự do / không gian sáng tạo"],
                    ["stærkere bånd / forbindelse", "sự gắn kết bền chặt hơn"], ["brætspil / kortspil", "cờ bàn / trò chơi bài"],
                    ["symfoniorkester", "dàn nhạc giao hưởng"], ["bogklub", "câu lạc bộ sách"],
                    ["at brodere / strikke", "thêu / đan (len)"], ["overvældende oplevelse", "trải nghiệm choáng ngợp"],
                    ["recharge-dag", "ngày nạp lại năng lượng"], ["ensformig", "đơn điệu, nhàm chán"],
                    ["at prioritere sine hobbyer", "ưu tiên cho sở thích cá nhân"], ["at udtrykke sig kreativt", "thể hiện bản thân một cách sáng tạo"]
                ]
            }
        ];
        let currentTopic = 0;
        let activeTab = "billeder";

        function renderSidebar() {
            const container = document.getElementById("sidebar-nav");

            // Array of colors for topic icons
            const iconColors = [
                "rgba(59,130,246,0.15)", // blue
                "rgba(34,197,94,0.15)",  // green
                "rgba(239,68,68,0.15)",  // red
                "rgba(245,158,11,0.15)", // amber
                "rgba(139,92,246,0.15)", // purple
                "rgba(20,184,166,0.15)", // teal
                "rgba(236,72,153,0.15)", // pink
                "rgba(249,115,22,0.15)", // orange
                "rgba(6,182,212,0.15)",  // cyan
                "rgba(99,102,241,0.15)"  // indigo
            ];

            let html = "";
            topics.forEach((t, i) => {
                const color = iconColors[i % iconColors.length];
                const isActive = currentTopic === i ? "active" : "";
                html += `
                    <button class="topic-btn ${isActive}" onclick="selectTopic(${i})">
                        <div class="topic-icon" style="background: ${color};">${t.emoji}</div>
                        <div>
                            <div class="topic-name">${t.title}</div>
                            <div class="topic-sub">${t.sub}</div>
                        </div>
                    </button>
                `;
            });

            container.innerHTML = html;
        }

        function selectTopic(i) {
            currentTopic = i;
            activeTab = "billeder";
            renderSidebar(); // Update active states in sidebar
            render();        // Render main content
        }

        function selectTab(t) {
            activeTab = t;
            render();
        }

        function toggleAnswer(i) {
            const el = document.getElementById("ans-" + i);
            const btn = document.getElementById("tbtn-" + i);
            if (el.classList.contains("open")) {
                el.classList.remove("open");
                btn.textContent = "Vis svar";
            } else {
                el.classList.add("open");
                btn.textContent = "Skjul svar";
            }
        }

        function render() {
            const t = topics[currentTopic];
            const main = document.getElementById("main-content");

            const tabs = ["billeder", "del1", "del2", "ord"];
            const tabLabels = ["🖼 Billeder", "💬 Del 1 – Dialog", "❓ Del 2 – Spørgsmål", "📚 Nyttige ord"];

            let html = `
    <div class="page-header">
      <div class="page-topic">
        <span class="page-topic-icon">${t.emoji}</span>
        <div>
          <div class="page-topic-title">${t.title}</div>
          <div class="page-topic-meta">${t.sub}</div>
        </div>
      </div>
      <span class="level-badge">A2–B1 · DU3 Modul 3</span>
    </div>

    <div class="tabs">
      ${tabs.map((tab, i) => `<button class="tab-btn ${activeTab === tab ? "active" : ""}" onclick="selectTab('${tab}')">${tabLabels[i]}</button>`).join("")}
    </div>
  `;

            if (activeTab === "billeder") {
                html += `
      <div class="intro-card">
        <h2>📋 Sådan fungerer Opgave 2</h2>
        <div class="intro-steps">
          <div class="step">
            <div class="step-label">Del 1 · ~4 min</div>
            <div class="step-text">Paropgave: Du og din partner får 4 billeder og diskuterer præferencer</div>
          </div>
          <div class="step">
            <div class="step-label">Del 2 · ~3 min</div>
            <div class="step-text">Individuel: Tester stiller uddybende spørgsmål om dine erfaringer</div>
          </div>
          <div class="step">
            <div class="step-label">Bedømmelse</div>
            <div class="step-text">Bestået / Ikke bestået ud fra en helhedsvurdering</div>
          </div>
        </div>
      </div>

      <div class="images-grid">
        ${t.images.map((img, i) => `
          <div class="image-card">
            <div class="image-num">Billede ${i + 1}</div>
            <div class="image-emoji">${img.emoji}</div>
            <div class="image-label">${img.label}</div>
            <div class="image-desc">${img.desc}</div>
          </div>
        `).join("")}
      </div>

      <div class="format-box">
        <h3>Hvad du skal gøre i Del 1 (paropgave)</h3>
        <div class="format-row"><span class="format-tag">1</span><span class="format-text">Se de fire billeder sammen med din partner</span></div>
        <div class="format-row"><span class="format-tag">2</span><span class="format-text">Fortæl, hvad du kan se på hvert billede</span></div>
        <div class="format-row"><span class="format-tag">3</span><span class="format-text">Giv udtryk for dine præferencer – hvad foretrækker du og hvorfor?</span></div>
        <div class="format-row"><span class="format-tag">4</span><span class="format-text">Stil spørgsmål til din partner om ALLE fire billeder</span></div>
        <div class="format-row"><span class="format-tag">5</span><span class="format-text">Svar på din partners spørgsmål med korte begrundelser</span></div>
      </div>

      <div class="task-tip">
        <strong>⚠️ Vigtigt:</strong> Du skal kommentere ALLE 4 billeder – ikke kun dit yndlingsbillede. Tester observerer, om du er aktiv og stiller spørgsmål til din partner.
      </div>
    `;
            }

            if (activeTab === "del1") {
                html += `
      <div class="tip-box">
        <strong>💬 Tip til Del 1 – Paropgave</strong>
        ${t.del1tip}
      </div>

      <div class="dialogue">
        ${t.dialogue.map(d => `
          <div class="bubble bubble-${d.s.toLowerCase()}">
            <div class="bubble-avatar avatar-${d.s.toLowerCase()}">${d.s}</div>
            <div class="bubble-text">${d.t}</div>
          </div>
        `).join("")}
      </div>

      <div class="phrase-box">
        <h3>Nyttige sætninger til Del 1</h3>
        <div class="phrase-grid">
          ${t.phrases.map(p => `<div class="phrase-chip">${p}</div>`).join("")}
        </div>
      </div>

      <div class="card" style="margin-top: 16px; background: #FFF8F8; border-color: rgba(192,57,43,0.15);">
        <div style="font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase;">❌ Undgå disse fejl</div>
        <div style="font-size: 14px; color: var(--text); line-height: 1.8;">
          • Undgå: <em>"Det er en god måde for mig at… / Det er vigtigt for mig at…"</em> (for unaturligt og gentages for meget)<br>
          • Undgå at tale i for lang tid uden at spørge din partner<br>
          • Undgå at springe et af de fire billeder over<br>
          • Undgå at læse op fra forberedte sætninger
        </div>
      </div>
    `;
            }

            if (activeTab === "del2") {
                html += `
      <div class="tip-box">
        <strong>❓ Tip til Del 2 – Individuel</strong>
        Tester stiller uddybende spørgsmål om dine egne erfaringer og præferencer. Svar naturligt og giv korte begrundelser. Det er OK at sige "Jeg ved det ikke helt, men jeg tror, at…"
      </div>

      ${t.del2.map((item, i) => `
        <div class="q-card">
          <div class="q-header" onclick="toggleAnswer(${i})">
            <span class="q-num">SPM ${i + 1}</span>
            <span class="q-text">${item.q}</span>
            <button class="q-toggle" id="tbtn-${i}">Vis svar</button>
          </div>
          <div class="q-answer" id="ans-${i}">
            <div class="q-answer-label">Eksempel på svar</div>
            <div class="q-answer-text">${item.a}</div>
            <div class="vn-note">💡 ${item.vn}</div>
          </div>
        </div>
      `).join("")}

      <div class="card" style="margin-top: 8px; background: var(--blue-light); border-color: rgba(21,67,96,0.15);">
        <div style="font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase;">Gode fraser til Del 2</div>
        <table class="phrase-table">
          <tr><td>Ja, det synes jeg, fordi…</td><td>Vâng, tôi nghĩ vậy, vì…</td></tr>
          <tr><td>Nej, ikke rigtig. Jeg foretrækker…</td><td>Không hẳn. Tôi thích… hơn</td></tr>
          <tr><td>Det er svært at sige, men…</td><td>Khó nói, nhưng…</td></tr>
          <tr><td>Da jeg var yngre, plejede jeg at…</td><td>Khi còn trẻ, tôi thường…</td></tr>
          <tr><td>I mit hjemland er der…</td><td>Ở quê hương tôi có…</td></tr>
          <tr><td>Jeg tror, at det er vigtigt at…</td><td>Tôi nghĩ điều quan trọng là…</td></tr>
        </table>
      </div>
    `;
            }

            if (activeTab === "ord") {
                html += `
      <div class="vocab-grid">
        ${t.vocab.map(([da, vn]) => `
          <div class="vocab-card">
            <div class="vocab-word">${da}</div>
            <div class="vocab-def">${vn}</div>
          </div>
        `).join("")}
      </div>

      <div class="vocab-section">
        <h3>Generelle nøglesætninger til Opgave 2</h3>
        <table class="phrase-table">
          <tr><td>Jeg foretrækker … frem for …</td><td>Tôi thích… hơn là…</td></tr>
          <tr><td>Fordelen ved … er, at …</td><td>Ưu điểm của… là…</td></tr>
          <tr><td>Ulempen er, at …</td><td>Nhược điểm là…</td></tr>
          <tr><td>Jeg synes, at … er bedre, fordi …</td><td>Tôi nghĩ… tốt hơn, vì…</td></tr>
          <tr><td>Hvad synes du om …?</td><td>Bạn nghĩ gì về…?</td></tr>
          <tr><td>Er du til / ikke til …?</td><td>Bạn có thích… không?</td></tr>
          <tr><td>Jeg har aldrig prøvet at …</td><td>Tôi chưa bao giờ thử…</td></tr>
          <tr><td>Har du nogensinde …?</td><td>Bạn có bao giờ…?</td></tr>
          <tr><td>Hvilken af disse foretrækker du?</td><td>Bạn thích cái nào trong số này?</td></tr>
          <tr><td>Jeg bruger … til at …</td><td>Tôi dùng… để…</td></tr>
        </table>
      </div>
    `;
            }

            main.innerHTML = html;
        }

        // Initialize App
        renderSidebar();
        render();
    </script>
</body>

</html>
